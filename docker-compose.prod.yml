version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aip-postgres
    environment:
      POSTGRES_USER: aip
      POSTGRES_PASSWORD: aip
      POSTGRES_DB: aip
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aip"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aip-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aip-backend
    env_file:
      - .env
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  sync-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aip-sync-worker
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.sync_worker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aip-frontend
    ports:
      - "3005:3000"
    depends_on:
      - backend
    command: npm run preview -- --host 0.0.0.0

volumes:
  postgres_data:
